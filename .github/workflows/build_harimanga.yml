name: Build Harimanga
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build Harimanga
        run: ./gradlew :src:en:harimanga:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: harimanga-apk
          path: src/en/harimanga/build/outputs/apk/debug/*.apk 
